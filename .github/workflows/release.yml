name: release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write
  id-token: write

jobs:
  package:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: ui/package-lock.json
      - name: Install system packages
        run: sudo apt-get update && sudo apt-get install -y libraw-dev
      - name: Build UI
        working-directory: ui
        run: npm ci && npm run build
      - name: Include UI assets in package
        run: mkdir -p src/dropraw_web/ui/dist && cp -R ui/dist/. src/dropraw_web/ui/dist/
      - name: Install build tools
        run: python -m pip install build twine
      - name: Build package
        run: python -m build
      - name: Check package
        run: twine check dist/*
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: DropRaw Web ${{ github.ref_name }} — Multi-cloud RAW to Web Assets
          body_path: docs/release-notes/v0.1.0.md
          files: dist/*
      - name: Publish to PyPI
        if: ${{ vars.PUBLISH_PYPI == 'true' }}
        uses: pypa/gh-action-pypi-publish@release/v1
